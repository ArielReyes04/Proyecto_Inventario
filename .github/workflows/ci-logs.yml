name: Kaños Ferretería - CI & DevSecOps Log Pipeline

# El pipeline se ejecutará automáticamente al subir cambios o hacer PR a develop o main
on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # ==========================================
  # JOB 1: VERIFICACIÓN DEL BACKEND (Spring Boot)
  # ==========================================
  backend-validation:
    name: Spring Boot Compile & Lint Logs
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Entorno Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          # Cache automático de Maven para acelerar futuras ejecuciones
          cache: 'maven'
          # Apuntamos al archivo pom.xml que está dentro de tu carpeta 'master'
          project-info-file: './master/pom.xml'

      - name: Log - Iniciando Compilación Backend
        run: echo "--- LOG INTERNO:[INICIANDO VERIFICACIÓN DE SPRING BOOT EN CARPETA 'MASTER'] ---"

      - name: Compilar Backend (Genera Logs)
        run: |
          cd master
          # Da permisos de ejecución al empaquetador de Maven incluido en tu proyecto
          chmod +x mvnw
          # Compila el proyecto saltando los tests si aún no los tienes implementados
          ./mvnw clean compile -DskipTests

      - name: Log - Éxito Backend
        run: echo "--- LOG INTERNO:[EL BACKEND COMPILÓ EXITOSAMENTE Y NO TIENE ERRORES DE SINTAXIS] ---"


  # ==========================================
  # JOB 2: VERIFICACIÓN DEL FRONTEND (Angular)
  # ==========================================
  frontend-validation:
    name: Angular Build Logs
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Entorno Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Log - Instalando Dependencias de Angular
        run: echo "--- LOG INTERNO:[INSTALANDO NODE_MODULES DEL FRONTEND] ---"

      - name: Instalar paquetes de Node
        run: |
          cd frontend
          npm install

      - name: Log - Compilando en Modo Producción
        run: echo "--- LOG INTERNO:[INICIANDO PRUEBA DE BUILD DE ANGULAR] ---"

      - name: Ejecutar Build de Control
        run: |
          cd frontend
          npx ng build --configuration production

      - name: Log - Éxito Frontend
        run: echo "--- LOG INTERNO:[EL FRONTEND DE ANGULAR PASÓ LA COMPILACIÓN DE CONTROL CON ÉXITO] ---"