name: Kaños Ferretería - CI/CD Pipeline con Telegram

# El pipeline se ejecutará automáticamente al subir cambios o hacer PR a develop
on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

permissions:
  contents: write

jobs:
  # ==========================================
  # JOB 1: PROMOCIÓN A TEST (MERGE DEVELOP -> TEST)
  # ==========================================
  promote-to-test:
    name: Promover código de Develop a Test
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para hacer merge
          
      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
      - name: Realizar Merge de Develop a Test
        run: |
          git checkout test
          git merge origin/develop --no-edit
          git push origin test

  # ==========================================
  # JOB 2: PRUEBAS BACKEND Y FRONTEND
  # ==========================================
  run-tests:
    name: Ejecutar Pruebas de Software
    needs: promote-to-test
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código de la rama Test
        uses: actions/checkout@v4
        with:
          ref: test # Asegurarnos de probar la rama test actualizada
          
      # Backend
      - name: Configurar Entorno Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          project-info-file: './master/pom.xml'
          
      - name: Compilar y Probar Backend
        run: |
          cd master
          chmod +x mvnw
          # Ejecutar pruebas unitarias en Spring Boot
          ./mvnw clean test

      # Frontend
      - name: Configurar Entorno Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Instalar y Compilar Frontend
        run: |
          cd frontend
          npm install
          cp src/environments/environment.example.ts src/environments/environment.ts
          cp src/environments/environment.example.ts src/environments/environment.prod.ts
          
          # Verificar compilación
          npx ng build --configuration production
          
          # Ejecutar pruebas unitarias de Angular (comentado por defecto si no existen tests estables)
          # npx ng test --watch=false --browsers=ChromeHeadless

  # ==========================================
  # JOB 3: PROMOCIÓN A MAIN (MERGE TEST -> MAIN)
  # ==========================================
  promote-to-main:
    name: Promover código de Test a Main
    needs: run-tests
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
      - name: Realizar Merge de Test a Main
        run: |
          git checkout main
          git merge origin/test --no-edit
          git push origin main

  # ==========================================
  # JOB 4: NOTIFICACIÓN DE TELEGRAM
  # ==========================================
  notify-telegram:
    name: Notificación a Telegram
    needs: [promote-to-test, run-tests, promote-to-main]
    if: always() # Se ejecuta siempre, para notificar éxitos o fallos
    runs-on: ubuntu-latest
    steps:
      - name: Enviar mensaje de Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            📢 *Actualización en el Pipeline CI/CD* 📢
            Repositorio: ${{ github.repository }}
            Autor del commit: ${{ github.actor }}
            
            Resultados del Flujo (Develop -> Test -> Main):
            - Promoción a Test: ${{ needs.promote-to-test.result }}
            - Pruebas de Software: ${{ needs.run-tests.result }}
            - Promoción a Main: ${{ needs.promote-to-main.result }}
            
            [Ver detalles en GitHub Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})